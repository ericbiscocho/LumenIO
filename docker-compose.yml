services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lumenio
      POSTGRES_USER: lumenio
      POSTGRES_PASSWORD: localdev
    ports: ["5432:5432"]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    volumes: ["./backend:/app"]
    environment:
      DATABASE_URL: postgres://lumenio:localdev@db:5432/lumenio
    env_file:
      - backend/.env
    depends_on: [db]
    restart: on-failure
    ports: ["8000:8000"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      target: builder         # use dev stage locally
    command: npm run dev -- --host
    volumes: ["./frontend:/app", "/app/node_modules"]
    ports: ["5173:5173"]
